# Apache Virtual Host Configuration for QA Evaluation App - Fedora Development
# Updated with proper timeout settings for AI processing
# 
# Copy this file to: /etc/httpd/conf.d/qa-eval.conf
# 
# Quick setup:
# sudo cp qa-eval-updated.conf /etc/httpd/conf.d/qa-eval.conf
# sudo systemctl restart httpd

<VirtualHost *:80>
    ServerName qa-eval.local
    ServerAlias www.qa-eval.local
    DocumentRoot /var/www/html/eval
    
    # Timeout settings for AI processing
    Timeout 600
    KeepAliveTimeout 600
    
    # Basic directory permissions
    <Directory /var/www/html/eval>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Assets directory - allow direct access
    <Directory /var/www/html/eval/assets>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>
    
    # Uploads directory - secure access
    <Directory /var/www/html/eval/uploads>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
        
        # Prevent execution of PHP files in uploads
        <FilesMatch "\.(php|phtml|php3|php4|php5|pl|py|jsp|asp|sh|cgi)$">
            Require all denied
        </FilesMatch>
    </Directory>
    
    # Protect sensitive directories
    <Directory /var/www/html/eval/vendor>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/eval/app>
        Require all denied
    </Directory>
    
    <Directory /var/www/html/eval/sql>
        Require all denied
    </Directory>
    
    # Development logs
    ErrorLog /var/log/httpd/qa-eval-error.log
    CustomLog /var/log/httpd/qa-eval-access.log combined
    LogLevel warn
    
    # PHP settings for development and AI processing
    <IfModule mod_php.c>
        php_admin_value upload_max_filesize 50M
        php_admin_value post_max_size 60M
        php_admin_value max_execution_time 600
        php_admin_value max_input_time 600
        php_admin_value memory_limit 512M
        php_admin_flag display_errors On
        php_admin_flag log_errors On
        php_admin_value error_log /var/www/html/eval/error.log
    </IfModule>
    
    # PHP-FPM specific settings
    <IfModule mod_proxy_fcgi.c>
        # Set timeout for PHP-FPM requests
        ProxyTimeout 600
        ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://127.0.0.1:9000/var/www/html/eval/$1
    </IfModule>
</VirtualHost>
